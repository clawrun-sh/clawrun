[package]
name = "zeroclaw-napi"
version = "0.0.1"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", features = ["napi9", "serde", "tokio_rt"] }
napi-derive = "3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
zeroclaw = { path = "/zeroclaw-patch", default-features = false }

[build-dependencies]
napi-build = "2"

[profile.dev]
opt-level = 0
