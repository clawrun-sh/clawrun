name: Initial Publish

# Run every 30 minutes from 16:00-18:00 UTC on March 16, 2026
# to catch the 24-hour window expiry (~16:47 UTC).
# Delete this workflow after the first successful publish.
on:
  schedule:
    - cron: "*/30 16-18 16 3 *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  publish:
    if: github.repository == 'clawrun-sh/clawrun'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: changeset publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
